<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كتب تعليم اللغة العربية</title>

<style>
body {
  font-family: Arial;
  background:#f9f9f9;
  margin:0;
  padding:0;
}

/* HEADER */
header {
  background:#008080;
  color:white;
  padding:20px;
  text-align:center;
}

/* SEARCH */
.search-box {
  text-align:center;
  margin:20px;
}

.search-box input {
  padding:12px;
  width:60%;
  max-width:400px;
  border:2px solid #008080;
  border-radius:25px;
  outline:none;
}

/* GRID */
.book-grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin:30px;
}

/* BOOK CARD */
.book {
  background:white;
  width:160px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  transition:0.3s;
}

.book:hover {
  transform:scale(1.05);
}

.book img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:5px;
}

/* BUTTON */
.order-btn {
  display:inline-block;
  margin-top:8px;
  padding:6px 10px;
  background:#008080;
  color:white;
  text-decoration:none;
  border-radius:5px;
  font-size:14px;
}

.order-btn:hover {
  background:#005f5f;
}

/* NO RESULT */
#noResult {
  text-align:center;
  color:red;
  font-weight:bold;
  display:none;
}
</style>
</head>

<body>

<header>
  <h2>📚 كتب تعليم اللغة العربية</h2>
</header>


<!-- BOOK GRID -->
<div class="book-grid">

  <div class="book">
    <img src="نور البيان.jpg">
    <p>نور البيان</p>
    <a href="order.html?book=نور البيان" class="order-btn">اطلب</a>
  </div>

  <div class="book">
    <img src="دروس اللغة العربية.jpg">
    <p>دروس اللغة العربية</p>
    <a href="order.html?book=دروس اللغة العربية" class="order-btn">اطلب</a>
  </div>

  <div class="book">
    <img src="القراءة الراشدة.jpg">
    <p>القراءة الراشدة</p>
    <a href="order.html?book=القراءة الراشدة" class="order-btn">اطلب</a>
  </div>

  <div class="book">
    <img src="متون طالب العلم.jpg">
    <p>متون طالب العلم</p>
    <a href="order.html?book=متون طالب العلم" class="order-btn">اطلب</a>
  </div>
  
   <div class="book">
    <img src="المنظومة الحائية.jpg">
    <p>المنظومة الحائية</p>
    <a href="order.html?book=المنظومة الحائية" class="order-btn">اطلب</a>
  </div>

  <div class="book">
    <img src="متن تحفة الأطفال.jpg">
    <p>متن تحفة الأطفال</p>
    <a href="order.html?book=متن تحفة الأطفال" class="order-btn">اطلب</a>
  </div>

</div>

</body>
</html>
